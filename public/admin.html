<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard - Rotaract Members</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #121212;
      color: #e0e0e0;
    }
    h2 {
      margin-bottom: 10px;
      color: #00b4d8;
    }
    .controls {
      margin-bottom: 15px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    input, select, button {
      padding: 8px 12px;
      border-radius: 4px;
      border: none;
      font-size: 14px;
    }
    input, select {
      background: #1e1e1e;
      color: #e0e0e0;
      border: 1px solid #333;
    }
    button {
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .logout {
      background: #dc3545;
      color: #fff;
      margin-left: auto;
    }
    .logout:hover { background: #a71d2a; }
    .superadmin-only {
      background: #28a745;
      color: #fff;
    }
    .superadmin-only:hover { background: #1e7e34; }
    .delete-btn {
      background: #dc3545;
      color: #fff;
    }
    .delete-btn:hover { background: #a71d2a; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      font-size: 14px;
    }
    th, td {
      border: 1px solid #333;
      padding: 10px;
      text-align: left;
    }
    th {
      background: #00b4d8;
      color: #fff;
    }
    tr:nth-child(even) { background: #1e1e1e; }
    .pagination {
      margin-top: 20px;
      text-align: center;
    }
    .pagination button {
      margin: 0 5px;
      padding: 6px 12px;
      background: #00b4d8;
      color: #fff;
    }
    .pagination button:hover { background: #0077b6; }
    @media (max-width: 768px) {
      table, thead, tbody, th, td, tr {
        display: block;
      }
      tr { margin-bottom: 15px; }
      td {
        border: none;
        padding: 6px;
        display: flex;
        justify-content: space-between;
      }
      td::before {
        content: attr(data-label);
        font-weight: bold;
        color: #00b4d8;
      }
    }
  </style>
</head>
<body>
  <h2>Charter Members Dashboard</h2>
  <button class="logout" onclick="logout()">Logout</button>

  <!-- Controls -->
  <div class="controls">
    <input type="text" id="searchInput" placeholder="Search by name or city">
    <select id="genderFilter">
      <option value="">All Genders</option>
      <option value="Male">Male</option>
      <option value="Female">Female</option>
      <option value="Prefer not to say">Prefer not to say</option>
    </select>
    <button onclick="loadMembers()">Refresh</button>
    <button id="csvBtn">Download CSV</button>
    <button id="excelBtn">Download Excel</button>
    <button id="registerAdminBtn" class="superadmin-only" style="display:none;" onclick="window.location.href='register.html'">
      Register Admin
    </button>
  </div>

  <!-- Members Table -->
  <table id="membersTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Title</th>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Gender</th>
        <th>DOB</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Club Name</th>
        <th>City</th>
        <th>Country</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <!-- Pagination -->
  <div class="pagination">
    <button onclick="prevPage()">Prev</button>
    <span id="pageInfo"></span>
    <button onclick="nextPage()">Next</button>
  </div>

  <script>
    let allMembers = [];
    let currentPage = 1;
    const rowsPerPage = 20;
    const API_URL = "/api";
    const token = localStorage.getItem("token");
    let userRole = localStorage.getItem("userRole");

    async function loadMembers() {
      try {
        const response = await fetch(`${API_URL}/members`, {
          headers: { Authorization: `Bearer ${token}` }
        });
        if (response.status === 401) {
          alert("Unauthorized. Please log in.");
          window.location.href = "login.html";
          return;
        }
        allMembers = await response.json();
        applyFilters();
      } catch (error) {
        console.error("Error loading members:", error);
      }
    }

    function renderTable(members) {
      const tbody = document.querySelector("#membersTable tbody");
      tbody.innerHTML = "";

      const start = (currentPage - 1) * rowsPerPage;
      const end = start + rowsPerPage;
      const paginatedMembers = members.slice(start, end);

      paginatedMembers.forEach(member => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td data-label="ID">${member.id}</td>
          <td data-label="Title">${member.title || ""}</td>
          <td data-label="First Name">${member.first_name}</td>
          <td data-label="Last Name">${member.last_name}</td>
          <td data-label="Gender">${member.gender}</td>
          <td data-label="DOB">${member.dob}</td>
          <td data-label="Email">${member.email}</td>
          <td data-label="Phone">${member.phone}</td>
          <td data-label="Phone">${member.phone}</td>
          <td data-label="Club Name">${member.Club_Name}</td>
          <td data-label="City">${member.city}</td>
          <td data-label="Country">${member.country}</td>
          <td data-label="Actions">
            ${userRole === "admin" || userRole === "superadmin" 
              ? `<button class="delete-btn" onclick="deleteMember(${member.id})">Delete</button>` 
              : ""}
          </td>
        `;
        tbody.appendChild(row);
      });

      document.getElementById("pageInfo").textContent =
        `Page ${currentPage} of ${Math.ceil(members.length / rowsPerPage)}`;
    }

    document.getElementById("searchInput").addEventListener("input", applyFilters);
    document.getElementById("genderFilter").addEventListener("change", applyFilters);

    function applyFilters() {
      const searchValue = document.getElementById("searchInput").value.toLowerCase();
      const genderValue = document.getElementById("genderFilter").value;

      const filtered = allMembers.filter(member => {
        const matchesSearch =
          member.first_name.toLowerCase().includes(searchValue) ||
          member.last_name.toLowerCase().includes(searchValue) ||
          member.city.toLowerCase().includes(searchValue);

        const matchesGender = genderValue ? member.gender === genderValue : true;

        return matchesSearch && matchesGender;
      });

      renderTable(filtered);
    }

    function nextPage() {
      if (currentPage < Math.ceil(allMembers.length / rowsPerPage)) {
        currentPage++;
        applyFilters();
      }
    }

    function prevPage() {
      if (currentPage > 1) {
        currentPage--;
        applyFilters();
      }
    }

    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("userRole");
      alert("Logged out successfully.");
      window.location.href = "login.html";
    }

    async function deleteMember(id) {
      if (!confirm("Are you sure you want to delete this member?")) return;
      try {
        const response = await fetch(`${API_URL}/deleteMember?id=${id}`, {
          method: "DELETE",
          headers: { Authorization: `Bearer ${token}` }
        });
        const result = await response.json();
        alert(result.message);
        loadMembers();
      } catch (error) {
        console.error("Error deleting member:", error);
        alert("Failed to delete member.");
      }
    }

    function checkRole() {
      if (userRole === "superadmin") {
        document.getElementById("registerAdminBtn").style.display = "inline-block";
      }
    }

    // Export buttons with proper headers
    document.getElementById("csvBtn").onclick = async () => {
      const response = await fetch(`${API_URL}/exportCsv`, {
        headers: { Authorization: `Bearer ${token}` }
          // Initial load
    checkRole();
    loadMembers();
  </script>
</body>
</html>
